<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Дневник Тренировок</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0d12;
  --surface:#14141c;
  --surface2:#1c1c28;
  --border:#252535;
  --border2:#2e2e42;
  --txt:#e8e8f4;
  --txt2:#9090b0;
  --txt3:#55556a;
  --accent:#ff4f00;
  --accent2:#ff8c00;
  --blue:#3b8cff;
  --green:#00e57a;
  --red:#ff3b5c;
  --yellow:#ffd000;
}
*{box-sizing:border-box;margin:0;padding:0; -webkit-tap-highlight-color: transparent;}
body{
  font-family:'Inter', sans-serif; /* Оптимизация шрифта для мобильных */
  background:var(--bg);
  color:var(--txt);
  height:100vh;
  display:flex;
  flex-direction:column;
  overflow: hidden;
}
.app{padding:1rem 1rem 0.5rem;flex:1;display:flex;flex-direction:column;max-width:100%;}

/* ШАПКА */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:0 2px;margin-bottom:1rem;}
.hdr-nav{display:flex;align-items:center;gap:4px}
.nav-btn{
  background:var(--surface2);
  border:1px solid var(--border2);
  border-radius:8px;
  color:var(--accent);
  font-size:20px;font-weight:800;
  cursor:pointer;padding:8px 16px;line-height:1;
}
.month-title{
  font-family:'Barlow Condensed',sans-serif;
  font-size:22px;font-weight:800;
  color:var(--txt);
  min-width:180px;
  text-transform:uppercase;
}

/* СЕТКА КАЛЕНДАРЯ (БЕЗ ИЗМЕНЕНИЙ СТРУКТУРЫ) */
.wdays{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--border)}
.wd{text-align:center;font-size:10px;font-weight:700;color:var(--txt3);padding:6px 0;text-transform:uppercase;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);flex:1;min-height:0;border-top:1px solid var(--border)}
.day{min-height:0;background:var(--bg);border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:4px;cursor:pointer;overflow:hidden;}
.day.today .dnum{background:var(--blue);color:#fff;border-radius:50%;width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;}
.dnum{font-size:11px;font-weight:600;color:var(--txt2);margin-bottom:4px;display:block;}
.day-chip{display:block;width:100%;margin-bottom:2px;padding:2px 4px;border-radius:3px;font-size:9px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;background:#a8c8ef;color:#000;}
.day-chip.main{background:var(--accent);color:#fff;}

/* МОДАЛЬНОЕ ОКНО */
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;backdrop-filter:blur(8px)}
.mbg.open{display:flex;}
.modal{
  background:var(--surface);
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
}
.modal-hdr{
  padding:16px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  border-bottom:1px solid var(--border);
}
.modal-hdr h2{font-family:'Barlow Condensed',sans-serif; font-size:18px; text-transform:uppercase;}
.modal-close{background:var(--surface2); border:1px solid var(--border2); color:var(--txt2); padding:8px 12px; border-radius:8px;}

/* АККОРДЕОН (НОВЫЙ ИНТЕРФЕЙС) */
.accordion-list {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
}
.ex-item {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 12px;
  margin-bottom: 8px;
  overflow: hidden;
  transition: all 0.2s;
}
.ex-item.active {
  border-color: var(--accent);
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
.ex-item-header {
  padding: 14px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
}
.ex-info {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.ex-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 16px;
  font-weight: 800;
  text-transform: uppercase;
  color: var(--txt);
}
.ex-meta {
  font-size: 12px;
  color: var(--txt3);
  font-weight: 600;
}
.ex-weight-badge {
  background: var(--bg);
  color: var(--accent);
  padding: 4px 10px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 800;
  border: 1px solid var(--border);
}

.ex-content {
  display: none;
  padding: 0 16px 16px;
  border-top: 1px solid var(--border);
  background: rgba(0,0,0,0.1);
}
.ex-item.active .ex-content {
  display: block;
}

/* ТАБЛИЦА ВНУТРИ АККОРДЕОНА */
.sets-grid {
  display: grid;
  grid-template-columns: 40px 1fr 1fr 40px;
  gap: 8px;
  align-items: center;
  margin-top: 12px;
}
.set-row-label { font-size: 11px; color: var(--txt3); text-align: center; font-weight: 700;}
.set-input-box {
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 10px;
  text-align: center;
  font-weight: 800;
  font-size: 15px;
  color: var(--txt);
  width: 100%;
}
.set-input-box:focus { border-color: var(--accent); outline: none; }

/* ПАНЕЛЬ ДОБАВЛЕНИЯ */
.add-panel {
  padding: 16px;
  background: var(--surface2);
  border-top: 1px solid var(--border);
}
.input-group {
  display: flex;
  gap: 8px;
  margin-bottom: 8px;
}
select, input {
  font-family: 'Inter', sans-serif;
  -webkit-appearance: none;
}
.main-select {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border2);
  color: var(--txt);
  padding: 12px;
  border-radius: 10px;
  font-weight: 600;
}
.btn-primary {
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 12px 20px;
  border-radius: 10px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* СТИЛИ ДЛЯ ВВОДА ЧИСЕЛ (MOBILE FRIENDLY) */
input[type="number"] {
  inputmode: decimal; /* Вызывает цифровую клавиатуру */
}

@media (max-width: 600px) {
  .month-title { font-size: 18px; min-width: 140px; }
  .nav-btn { padding: 6px 12px; }
}
</style>
</head>
<body>

<div class="app">
  <div class="hdr">
    <div class="hdr-nav">
      <button class="nav-btn" id="prevBtn">‹</button>
      <span class="month-title" id="monthTitle">Март 2026</span>
      <button class="nav-btn" id="nextBtn">›</button>
    </div>
    <div class="hdr-nav">
        <button class="nav-btn" style="font-size:12px; color:var(--green)" id="syncSaveBtn">↑ TG</button>
    </div>
  </div>

  <div class="wdays">
    <div class="wd">Пн</div><div class="wd">Вт</div><div class="wd">Ср</div>
    <div class="wd">Чт</div><div class="wd">Пт</div><div class="wd">Сб</div><div class="wd">Вс</div>
  </div>
  <div class="cal-grid" id="calGrid"></div>
</div>

<div class="mbg" id="mbg">
  <div class="modal">
    <div class="modal-hdr">
      <h2 id="modalTitle">Тренировка</h2>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    
    <div class="accordion-list" id="exerciseAccordion">
      </div>

    <div class="add-panel">
      <div class="input-group">
        <select class="main-select" id="exSelect"></select>
      </div>
      <div class="input-group">
        <input type="number" class="set-input-box" id="inWt" placeholder="Вес кг" inputmode="decimal">
        <input type="number" class="set-input-box" id="inPlan" placeholder="Повтор" inputmode="numeric">
        <button class="btn-primary" id="addExBtn">+</button>
      </div>
    </div>
  </div>
</div>

<script>
// ДАННЫЕ И ЛОГИКА (ОПТИМИЗИРОВАНО)
let exercises = ['Жим лёжа', 'Приседания', 'Становая тяга', 'Подтягивания', 'Жим гантелей'];
let sets = []; 
let nextId = 1;
let curDate = null;

// Загрузка данных
try {
    const saved = localStorage.getItem('gym_data_v10');
    if(saved) {
        const d = JSON.parse(saved);
        sets = d.sets || [];
        nextId = d.nextId || 1;
    }
} catch(e) {}

function persist() {
    localStorage.setItem('gym_data_v10', JSON.stringify({sets, nextId}));
}

// Календарь
let anchorMonday = new Date();
anchorMonday.setDate(anchorMonday.getDate() - (anchorMonday.getDay() === 0 ? 6 : anchorMonday.getDay() - 1));

function renderCalendar() {
    const grid = document.getElementById('calGrid');
    grid.innerHTML = '';
    const start = new Date(anchorMonday);
    
    document.getElementById('monthTitle').textContent = start.toLocaleString('ru', {month:'long', year:'numeric'});

    for(let i=0; i<28; i++) {
        const cur = new Date(start);
        cur.setDate(start.getDate() + i);
        const k = cur.toISOString().split('T')[0];
        
        const dayEl = document.createElement('div');
        dayEl.className = 'day';
        if(k === new Date().toISOString().split('T')[0]) dayEl.classList.add('today');
        
        dayEl.innerHTML = `<span class="dnum">${cur.getDate()}</span>`;
        
        // Отображение чипов в календаре
        const daySets = sets.filter(s => s.date === k);
        const uniqueEx = [...new Set(daySets.map(s => s.exercise))];
        uniqueEx.slice(0, 3).forEach(ex => {
            const chip = document.createElement('div');
            chip.className = 'day-chip' + (uniqueEx[0] === ex ? ' main' : '');
            chip.textContent = ex;
            dayEl.appendChild(chip);
        });

        dayEl.onclick = () => openDay(k);
        grid.appendChild(dayEl);
    }
}

// Модальное окно и Аккордеон
function openDay(date) {
    curDate = date;
    document.getElementById('mbg').classList.add('open');
    document.getElementById('modalTitle').textContent = new Date(date).toLocaleDateString('ru', {day:'numeric', month:'long'});
    renderAccordion();
}

function renderAccordion() {
    const container = document.getElementById('exerciseAccordion');
    container.innerHTML = '';
    
    const daySets = sets.filter(s => s.date === curDate);
    const exNames = [...new Set(daySets.map(s => s.exercise))];

    if(exNames.length === 0) {
        container.innerHTML = '<div style="text-align:center; padding:40px; color:var(--txt3)">Нет упражнений</div>';
        return;
    }

    exNames.forEach(name => {
        const exSets = daySets.filter(s => s.exercise === name);
        const lastWt = exSets[0].weight || 0;
        
        const item = document.createElement('div');
        item.className = 'ex-item';
        item.innerHTML = `
            <div class="ex-item-header">
                <div class="ex-info">
                    <span class="ex-title">${name}</span>
                    <span class="ex-meta">${exSets.length} подходов</span>
                </div>
                <div class="ex-weight-badge">${lastWt} кг</div>
            </div>
            <div class="ex-content">
                <div class="sets-grid">
                    <div class="set-row-label">№</div>
                    <div class="set-row-label">План</div>
                    <div class="set-row-label">Факт</div>
                    <div></div>
                </div>
                <div id="sets-list-${name.replace(/\s/g,'')}"></div>
                <button class="nav-btn" style="width:100%; margin-top:10px; font-size:12px;" onclick="addSetToEx('${name}')">+ Подход</button>
            </div>
        `;

        item.querySelector('.ex-item-header').onclick = () => {
            const wasActive = item.classList.contains('active');
            document.querySelectorAll('.ex-item').forEach(el => el.classList.remove('active'));
            if(!wasActive) item.classList.add('active');
        };

        container.appendChild(item);
        renderSetsForEx(name, item.querySelector(`[id^="sets-list"]`));
    });
}

function renderSetsForEx(name, container) {
    const exSets = sets.filter(s => s.date === curDate && s.exercise === name);
    container.innerHTML = '';
    
    exSets.forEach((s, idx) => {
        const row = document.createElement('div');
        row.className = 'sets-grid';
        row.style.marginBottom = '8px';
        row.innerHTML = `
            <div style="text-align:center; font-weight:bold; color:var(--txt3)">${idx+1}</div>
            <input type="number" class="set-input-box" value="${s.plan || ''}" onchange="updateSet(${s.id}, 'plan', this.value)" inputmode="numeric">
            <input type="number" class="set-input-box" value="${s.fact || ''}" style="color:var(--green)" onchange="updateSet(${s.id}, 'fact', this.value)" inputmode="numeric">
            <button class="nav-btn" style="color:var(--red); border:none; background:none" onclick="deleteSet(${s.id})">✕</button>
        `;
        container.appendChild(row);
    });
}

// Функции управления данными
window.addSetToEx = (name) => {
    const exSets = sets.filter(s => s.date === curDate && s.exercise === name);
    const last = exSets[exSets.length - 1];
    sets.push({
        id: nextId++,
        date: curDate,
        exercise: name,
        weight: last ? last.weight : 0,
        plan: last ? last.plan : 0,
        fact: null
    });
    persist();
    renderAccordion();
};

window.updateSet = (id, field, val) => {
    const s = sets.find(x => x.id === id);
    if(s) s[field] = parseFloat(val);
    persist();
    renderCalendar();
};

window.deleteSet = (id) => {
    sets = sets.filter(x => x.id !== id);
    persist();
    renderAccordion();
    renderCalendar();
};

document.getElementById('addExBtn').onclick = () => {
    const name = document.getElementById('exSelect').value;
    const wt = parseFloat(document.getElementById('inWt').value) || 0;
    const plan = parseFloat(document.getElementById('inPlan').value) || 0;
    
    if(!name) return;
    
    sets.push({ id: nextId++, date: curDate, exercise: name, weight: wt, plan: plan, fact: null });
    persist();
    renderAccordion();
    renderCalendar();
};

// Инициализация
function init() {
    const sel = document.getElementById('exSelect');
    exercises.forEach(ex => {
        const opt = document.createElement('option');
        opt.value = ex; opt.textContent = ex;
        sel.appendChild(opt);
    });

    document.getElementById('modalClose').onclick = () => document.getElementById('mbg').classList.remove('open');
    document.getElementById('prevBtn').onclick = () => { anchorMonday.setDate(anchorMonday.getDate()-7); renderCalendar(); };
    document.getElementById('nextBtn').onclick = () => { anchorMonday.setDate(anchorMonday.getDate()+7); renderCalendar(); };
    
    renderCalendar();
}

init();
</script>

</body>
</html>
